<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <link rel="stylesheet" href="/frontend/style.css">
</head>
<body class="home">

  <div class="form-container">
    <h1>🔐 Reset Password</h1>

    <input id="email" type="email" placeholder="Enter your Email"><br><br>

    <input id="newPassword" type="password" placeholder="New Password"><br><br>

    <input id="confirmPassword" type="password" placeholder="Confirm Password"><br><br>

    <button class="btn btn-primary" onclick="resetPassword()">
      Reset Password
    </button>

    <p id="msg"></p>

    <p>
      <a href="/frontend/login.html">⬅ Back to Login</a>
    </p>
  </div>

  <script>
    function resetPassword() {
      const email = document.getElementById("email").value;
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (newPassword !== confirmPassword) {
        document.getElementById("msg").innerText = "Passwords do not match";
        return;
      }

      fetch("http://localhost:5000/api/auth/reset-password", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email,
          newPassword
        })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("msg").innerText = data.message;

        if (data.message === "Password updated successfully") {
          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);
        }
      })
      .catch(err => console.error(err));
    }
  </script>

</body>
</html>
